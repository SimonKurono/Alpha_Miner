defaults:
  benchmark: SPY
  max_runtime_sec: 300
  risk_profile: risk_neutral
  start_date: "2020-01-01"
  end_date: "2024-12-31"
  min_symbol_coverage: 0.85
  request_timeout_sec: 30

providers:
  market:
    primary: stooq
    retries: 3
  text:
    sec:
      filing_types: ["10-K", "10-Q"]
      anchor_mode: run_window
      lookback_days: 365
    news:
      primary: gdelt
      max_docs_per_symbol: 50

